<style>
    .panel {
        border-right: 1px solid black;
        padding-right: calc(var(--spacing) * 4);
    }
    .dark .panel {
        border-color: rgba(var(--color-primary-500), 1);
    }
    @media (width <= 40rem) {
        .panel {
            border-right: 0px !important;
        }
    } 

    .info-node {
        backdrop-filter: blur(--var(--blur-md));
        background-color: rgba(var(--color-neutral-50), .5);
        border: 1px solid rgba(var(--color-neutral-200), 1);
        border-radius: var(--radius-sm);
        padding: calc(var(--spacing) * 2);
        text-align: center;
    }
    .dark .info-node {
        border: 1px solid rgba(var(--color-neutral-900), 1);
        background-color: rgba(0, 0, 0, .3);
    }
    .info-node h1, .info-node p { 	
        font-size: var(--text-sm);
        line-height: var(--text-sm--line-height); 
    }
    .info-node h1 {
        color: rgba(var(--color-primary-700), 1);
        font-weight: 600;
    }
    .dark .info-node h1 {
        color: rgba(var(--color-primary-400), 1);
    }
    .info-node p {
        color: rgba(var(--color-neutral-600), 1);
    }
    .dark .info-node p {
        color: rgba(var(--color-neutral-300), 1);
    }

    .tag-item {
        color: rgba(var(--color-secondary-600), 1);
        background-color: rgba(var(--color-secondary-50), 1);
        outline: 1px solid rgba(var(--color-secondary-600), 1);
        padding: calc(var(--spacing) * 0) calc(var(--spacing) * 3);
        font-size: var(--text-xs);
        border-radius: 9999px;
    }
    .dark .tag-item {
        color: rgba(var(--color-secondary-700), 1);
        background-color: rgba(var(--color-secondary-50), 1);
        outline-color: rgba(var(--color-secondary-700), 1);
    }

    .description-box {
        background-color: rgba(var(--color-primary-100), .8);
        backdrop-filter: blur(--var(--blur-xs));
        border-radius: var(--radius-md);
        border: 1px solid rgba(var(--color-primary-300), 1);
        padding: calc(var(--spacing) * 4);
        font-size: var(--text-sm);
        text-align: center;		
        line-height: 1.3;
        color: rgba(var(--color-primary-700), 1);
    }
    .dark .description-box {
        background-color: rgba(var(--color-primary-100), .9);
        border: 1px solid rgba(var(--color-primary-600), 1);
    }
</style>

<div class="panel"> <!-- Panel -->
    <div class="flex flex-col gap-2"> <!-- stack  -->
        <div class="description-box"> <!-- description -->
            <p>{{ .Params.description }}</p>
        </div>
        <div class="flex flex-col gap-2"> <!-- info nodes -->
            <div class="info-node">
                <h1>Team</h1>
                <p>{{ .Params.team }}</p>
            </div>
            <div class="info-node">
                <h1>Engine</h1>
                <p>{{ .Params.engine }}</p>
            </div>
            <div class="info-node">
                <h1>Platforms</h1>
                <p>{{ .Params.platforms }}</p>
            </div>
            <div class="info-node">
                <h1>Term</h1>
                <p>{{ .Params.term }}</p>
            </div>
            <div class="info-node">
                <h1>Role</h1>
                <p>{{ .Params.role }}</p>
            </div>
        </div>
        <div class="flex flex-wrap gap-1 justify-center"> <!-- tags -->
            {{ range .Params.tags }}
            <span class="tag-item">{{ . }}</span>
            {{ end }}
        </div>
    </div>
</div>
